<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#050505">
  <title>ByAlaitz | Galeria de eventos</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <link rel="stylesheet" href="styles.css?v=20260722-gallery-gap">
</head>

<body class="gallery-screen">
  <header class="gallery-header">
    <div class="gallery-brand">
      <img src="assets/logo.png" alt="ByAlaitz">
      <div>
        <p class="gallery-kicker">Fotografia de eventos</p>
        <h1>Galeria ByAlaitz</h1>
      </div>
    </div>
    <nav id="galleryEventNav" class="gallery-event-nav" aria-label="Eventos"></nav>
  </header>

  <main class="gallery-shell">
    <section class="gallery-intro">
      <p>Fotos clasificadas por eventos, listas para ver y compartir desde cualquier dispositivo.</p>
    </section>

    <div id="galleryStatus" class="gallery-status" role="status">Cargando eventos...</div>
    <div id="gallerySections" class="gallery-sections"></div>
  </main>

  <div id="galleryLightbox" class="gallery-lightbox" aria-hidden="true">
    <button id="lightboxClose" class="lightbox-close" type="button" aria-label="Cerrar">Cerrar</button>
    <button id="lightboxPrevious" class="lightbox-nav previous" type="button" aria-label="Foto anterior">Anterior</button>
    <img id="lightboxImage" alt="">
    <button id="lightboxNext" class="lightbox-nav next" type="button" aria-label="Foto siguiente">Siguiente</button>
    <p id="lightboxCaption"></p>
  </div>

  <footer class="gallery-footer">
    <span>Fotografias de ByAlaitz</span>
    <span>Web por anderibanez_</span>
  </footer>

  <script src="gallery.js?v=20260722-gallery-gap"></script>
</body>

</html>
